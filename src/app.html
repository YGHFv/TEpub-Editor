<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TEpub-Editor</title>
    <style>
      :root {
        background: #eef4f8;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #eef4f8;
      }
    </style>
    <script>
      (() => {
        try {
          if (/Android/i.test(navigator.userAgent || "") && location.pathname === "/") {
            location.replace("/mobile" + location.search + location.hash);
          }
        } catch (_) {
          /* keep desktop boot unchanged */
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
