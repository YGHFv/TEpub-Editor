name: tepub_editor_flutter
description: "Next-generation TEpub Editor built with Flutter."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^3.6.1
  crypto: ^3.0.6
  file_picker: ^8.1.7
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.3
  http: ^1.2.2
  path: ^1.9.0
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  window_manager: ^0.4.3
  flutter_widget_from_html_core: ^0.17.2
  webview_windows: ^0.4.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
